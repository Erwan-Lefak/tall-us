                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.05)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        }

        body {
            background: linear-gradient(180deg, #1A2332 0%, #0D1116 100%);

            overflow: hidden;
        }

        /* Elegant scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #D4AF37, #722F37);
            border-radius: 2px;
        }

        /* Premium glass effect */
        .glass-elegant {
            background: rgba(26, 35, 50, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        /* Gold shimmer text */
        .gold-shimmer {
            background: linear-gradient(135deg, #D4AF37 0%, #E8C969 50%, #D4AF37 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        /* Burgundy gradient text */
        .burgundy-text {
            background: linear-gradient(135deg, #E8C969 0%, #FAF8F5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Vertical elegance card */
        .card-elegant {
            background: linear-gradient(180deg,
                rgba(114, 47, 55, 0.1) 0%,
                rgba(26, 35, 50, 0.9) 100%
            );
            backdrop-filter: blur(20px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            box-shadow:
                0 8px 32px rgba(114, 47, 55, 0.2),

        /* Swipe card with vertical accent */
        .swipe-card {
            touch-action: none;
            cursor: grab;
        }
        .swipe-card:active {
            cursor: grabbing;
        }

        /* Elegant button press */
        .btn-elegant:active {
            transform: scale(0.95) translateY(2px);
        }

        /* Vertical line accent */
        .vertical-accent {
            position: relative;
        }
        .vertical-accent::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #D4AF37 0%, #722F37 100%);
            border-radius: 2px;
        }

        /* Heart pulse animation */
        .heart-pulse {
            animation: pulseHeart 1.5s ease-in-out infinite;
        }

        /* Smooth transitions */
        * {
            transition-property: color, background-color, border-color, transform, opacity;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 300ms;
        }

        /* Hide scrollbar */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Elegant badge */
        .badge-gold {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.2), rgba(212, 175, 55, 0.1));
            border: 1px solid rgba(212, 175, 55, 0.3);

            border: 1px solid rgba(114, 47, 55, 0.4);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

        // ===== Components =====

        // Logo with vertical T design
        const Logo = ({ size = 'md', showTagline = false }) => {

                md: 'w-20 h-20',
                lg: 'w-24 h-24',
            };

            const circumference = 2 * Math.PI * 40;
            const offset = circumference - (score / 100) * circumference;

            return (

                            strokeDashoffset={offset}

                        />

        // Discovery Card with elegant vertical design
        const DiscoveryCard = ({ profile, onSwipe, onSuperLike }) => {
            const cardRef = useRef(null);
            const [pos, setPos] = useState({ x: 0, y: 0 });

            const handleDragStart = useCallback(() => {}, []);
            const handleDragEnd = useCallback(() => {
                if (Math.abs(pos.x) > 100) {
                    onSwipe(profile.id, pos.x > 0 ? 'right' : 'left');
                }
                setPos({ x: 0, y: 0 });
            }, [pos, onSwipe, profile.id]);

            const handleDrag = useCallback((e, info) => {
                setPos({ x: info.offset.x, y: info.offset.y });
            }, []);

            const rotation = pos.x * 0.03;
            const opacity = Math.min(Math.abs(pos.x) / 200, 1);

            return (
                <div
                    ref={cardRef}
                    className="swipe-card absolute inset-0"
                    style={{
                        transform: `translate(${pos.x}px, ${pos.y}px) rotate(${rotation}deg)`,
                        touchAction: 'none',
                    }}
                    onMouseDown={(e) => {
                        const startX = e.clientX;
                        const startY = e.clientY;

                        const handleMouseMove = (moveEvent) => {
                            const deltaX = moveEvent.clientX - startX;
                            const deltaY = moveEvent.clientY - startY;
                            handleDrag(null, { offset: { x: deltaX, y: deltaY } });
                        };

                        const handleMouseUp = () => {
                            handleDragEnd();
                            document.removeEventListener('mousemove', handleMouseMove);
                            document.removeEventListener('mouseup', handleMouseUp);
                        };

                        document.addEventListener('mousemove', handleMouseMove);
                        document.addEventListener('mouseup', handleMouseUp);
                        handleDragStart();
                    }}
                >

                            )}

                            {/* Tagline overlay */}
                            {profile.tagline && (

                                        "{profile.tagline}"

                                </div>
                            )}

                            {/* Profile Info */}
                            <div className="absolute bottom-0 left-0 right-0 p-6">

                                        {profile.name}

                                    <div className="flex items-center gap-3 text-sm text-tall-cream/80 font-modern">
                                        <span className="gold-shimmer font-semibold">{profile.age}</span>

                                    </div>
                                </div>

                                <p className="text-tall-cream/90 text-sm mb-4 font-modern leading-relaxed">
                                    {profile.bio}
                                </p>

                                {/* Prompts */}
                                <div className="space-y-2 mb-4">
                                    {profile.prompts.map((prompt, i) => (
                                        <div
                                            key={i}
                                            className="p-3 bg-tall-midnight/40 backdrop-blur-sm rounded-xl border border-tall-gold/10 vertical-accent pl-4"
                                        >
                                            <p className="text-xs text-tall-gold-light font-medium mb-1 font-elegant">
                                                {prompt.split(':')[0]}
                                            </p>

                                        selectedPlan === plan.name
                                            ? 'bg-gradient-to-r from-tall-burgundy to-tall-burgundy-dark text-tall-cream border border-tall-gold/40'
                                            : 'bg-tall-midnight/40 text-tall-cream/70 border border-tall-burgundy/30 hover:bg-tall-midnight/60'
                                    }`}
                                >
                                    {selectedPlan === plan.name ? 'Choisir ce plan' : 'Sélectionner'}
                                </button>
                            </div>
                        ))}
                    </div>

                    {/* Tall Coins */}
                    <div className="mx-6 mt-8 p-5 bg-gradient-to-br from-tall-burgundy/20 to-tall-burgundy/10 rounded-2xl border border-tall-gold/20">
                        <h2 className="font-elegant font-bold mb-4 flex items-center gap-2 text-tall-cream">
                            <span className="text-xl">🪙</span>
                            <span>Tall Coins</span>
                        </h2>
                        <div className="grid grid-cols-3 gap-3">
                            {[
                                { coins: '100', price: '1,99€' },
                                { coins: '500', price: '7,99€', bonus: true },
                                { coins: '1000', price: '14,99€', bonus: true },
                            ].map((pack, i) => (
                                <button
                                    key={i}
                                    className="p-4 bg-tall-midnight/40 hover:bg-tall-midnight/60 rounded-xl border border-tall-burgundy/20 hover:border-tall-gold/30 transition-all"
                                >
                                    <div className="text-2xl font-bold gold-shimmer font-elegant">
                                        {pack.coins}
                                    </div>
                                    <div className="text-xs text-tall-cream/60 mt-1 font-modem">
                                        {pack.price}
                                    </div>
                                    {pack.bonus && (
                                        <div className="text-[10px] text-tall-gold mt-1 font-modern">
                                            + Bonus
                                        </div>
                                    )}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Select Banner */}
                    <div className="mx-6 mt-6 p-5 bg-gradient-to-br from-tall-midnight to-tall-burgundy/20 rounded-2xl border border-tall-gold/30">
                        <div className="flex items-center gap-4">
                            <div className="text-5xl">💎</div>
                            <div className="flex-1">
                                <h3 className="font-elegant font-bold text-tall-cream">Tall Us Select</h3>
                                <p className="text-xs text-tall-cream/60 font-modern">
                                    Sur invitation • Événements VIP
                                </p>
                            </div>
                            <button className="px-4 py-2 bg-tall-burgundy/30 hover:bg-tall-burgundy/40 rounded-xl text-xs font-medium text-tall-cream border border-tall-gold/30 transition-all font-modern">
                                En savoir plus
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        // ===== Main App =====
        const App = () => {
            const [activeTab, setActiveTab] = useState('discover');
            const [selectedChat, setSelectedChat] = useState(null);
            const [profiles] = useState(mockProfiles);
            const [conversations] = useState(mockConversations);

            const handleLike = (id) => console.log('Liked:', id);
            const handlePass = (id) => console.log('Passed:', id);
            const handleSuperLike = (id) => console.log('Super liked:', id);

            return (
                <div className="min-h-screen max-w-lg mx-auto relative">
                    {/* Main Content */}
                    <main className="h-screen">
                        {activeTab === 'discover' && (
                            <DiscoveryScreen
                                profiles={profiles}
                                onLike={handleLike}
                                onPass={handlePass}
                                onSuperLike={handleSuperLike}
                            />
                        )}

                        {activeTab === 'messages' && (
                            selectedChat ? (
                                <ChatScreen
                                    conversation={selectedChat}
                                    onBack={() => setSelectedChat(null)}
                                />
                            ) : (
                                <MessagesScreen
                                    conversations={conversations}
                                    onSelectChat={setSelectedChat}
                                />
                            )
                        )}

                        {activeTab === 'profile' && <ProfileScreen />}

                        {activeTab === 'premium' && <PremiumScreen />}
                    </main>

                    {/* Bottom Nav */}
                    {!selectedChat && (
                        <BottomNav activeTab={activeTab} setActiveTab={setActiveTab} />
                    )}
                </div>
            );
        };

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
