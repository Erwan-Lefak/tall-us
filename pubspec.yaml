name: tall_us
description: "Tall Us - Dating app for tall people"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  phosphor_flutter: ^2.1.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Code Generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Backend (Appwrite Cloud)
  appwrite: ^12.0.4

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.5

  # Firebase (Push Notifications)
  firebase_core: ^3.3.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^17.1.2

  # Network & Connectivity
  connectivity_plus: ^6.0.3
  dio: ^5.4.0

  # Local Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Utilities
  uuid: ^4.3.3
  logger: ^2.0.2+1
  path_provider: ^2.1.1

  # Date & Time
  intl: ^0.20.2
  timeago: ^3.6.0

  # Image Handling
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Navigation
  go_router: ^14.1.0
  url_launcher: ^6.3.0

  # Authentication (OAuth)
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # UI Components
  flutter_hooks: ^0.20.5
  hooks_riverpod: ^2.5.1

  # Forms
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.5

  # Linting
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Fonts temporarily commented - will be added later
  # fonts:
  #   - family: PlayfairDisplay
  #     fonts:
  #       - asset: assets/fonts/PlayfairDisplay-Regular.ttf
  #       - asset: assets/fonts/PlayfairDisplay-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/PlayfairDisplay-Bold.ttf
  #         weight: 700
  #
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700

  # Enable Impeller rendering engine (iOS)
  # Add to ios/Runner/Info.plist:
  # <key>FLTEnableImpeller</key>
  # <true/>
